<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartouche 2 - PC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="save_load.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-container"><img src="logo.png" alt="Logo" id="headerLogo" onerror="this.style.display='none'"></div>
            <h1>Cartouche 2</h1>
            <p class="subtitle">Dossier de demande de permis de construire</p>
            <div class="nav-links">
                <a href="./index.html" class="nav-link">🏠 Accueil</a>
                <a href="./devis.html" class="nav-link">🏷️ Devis</a>
                <a href="./facture.html" class="nav-link">📄 Facture</a>
                <a href="./cartouche1.html" class="nav-link">📋 Cartouche 1</a>
                <a href="./cartouche2.html" class="nav-link active">📋 Cartouche 2</a>
                <a href="./avant-projet.html" class="nav-link">📐 Avant Projet</a>
                <a href="./convertisseur.html" class="nav-link">📏 Pente / °</a>
                <a href="./pourcentages.html" class="nav-link">🧮 Pourcentages</a>
            </div>
        </header>

        <div class="card">
            <h2 class="card-title">Type de Dossier</h2>
            <div style="display: flex; gap: 1rem;">
                <input type="hidden" id="titreDossier" value="DOSSIER DE DEMANDE DE PERMIS DE CONSTRUIRE">
                <button id="btnPermis" class="btn-action active-type" onclick="selectType(this, 'DOSSIER DE DEMANDE DE PERMIS DE CONSTRUIRE')" style="background: var(--primary); color: white;">Demande de Permis</button>
                <button id="btnModif" class="btn-action" onclick="selectType(this, 'DOSSIER DE DEMANDE DE MODIFICATION DE PERMIS DE CONSTRUIRE')" style="background: var(--card); color: var(--primary);">Modification de Permis</button>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">Informations du Projet</h2>
            <div class="form-group"><label>Commune</label><input type="text" id="commune" value=""></div>
            <div class="form-group"><label>Adresse du projet</label><input type="text" id="adresse" value=""></div>
            <div class="form-group"><label>Maître d'ouvrage</label><input type="text" id="maitre" value=""></div>
        </div>

        <div class="card">
            <h2 class="card-title">Pièces du Dossier (PCMI)</h2>
            <div id="piecesContainer">
                <div class="piece-row"><input type="text" class="piece-label" value=""><input type="text"
                        class="piece-ref" value=""><button class="btn-remove" onclick="removePiece(this)">✕</button>
                </div>
            </div>
            <button class="btn-add" onclick="addPiece()">+ Ajouter une pièce</button>
        </div>

        <div class="card">
            <h2 class="card-title">Échelles</h2>
            <div id="echellesContainer">
                <div class="piece-row"><input type="text" class="piece-label echelle-label" value="PLAN DE MASSE"><input type="text"
                        class="piece-ref echelle-value" value=""><button class="btn-remove" onclick="removeEch(this)">✕</button>
                </div>
                <div class="piece-row"><input type="text" class="piece-label echelle-label" value="COUPES"><input type="text"
                        class="piece-ref echelle-value" value=""><button class="btn-remove" onclick="removeEch(this)">✕</button>
                </div>
                <div class="piece-row"><input type="text" class="piece-label echelle-label" value="FACADES"><input type="text"
                        class="piece-ref echelle-value" value=""><button class="btn-remove" onclick="removeEch(this)">✕</button>
                </div>
            </div>
            <button class="btn-add" onclick="addEch()">+ Ajouter une échelle</button>
        </div>

        <div class="card">
            <h2 class="card-title">Surfaces</h2>
            <div id="surfacesContainer">
                <div class="surface-row"><input type="text" class="surface-label" value=""><input type="text"
                        class="surface-value" value=""><button class="btn-remove" onclick="removeSurf(this)">✕</button>
                </div>
            </div>
            <button class="btn-add" onclick="addSurf()">+ Ajouter une surface</button>
        </div>
        <div class="card">
            <h2 class="card-title">Sauvegarde</h2>
            <div class="form-group">
                <label>Nom du document (pour l'export)</label>
                <input type="text" id="documentName" value="" placeholder="MonCartouche2">
            </div>
        </div>
        <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="loadFromJson(event)">
        <div class="action-buttons">
            <button class="btn-action" onclick="document.getElementById('fileInput').click()">📂 Charger (JSON)</button>
            <button class="btn-action" onclick="saveToJson()">💾 Sauvegarder (JSON)</button>
            <button class="btn-generate" onclick="generatePDF()">📄 Télécharger le Cartouche 2 (PDF)</button>
        </div>
    </div>

    <script>
        function removePiece(b) { const p = document.querySelectorAll('#piecesContainer .piece-row'); if (p.length > 1) b.closest('.piece-row').remove(); else alert('Au moins une pièce.'); }

        function addPiece() {
            const c = document.getElementById('piecesContainer'), d = document.createElement('div');
            d.className = 'piece-row';
            d.innerHTML = `<input type="text" class="piece-label" placeholder="Nom de la pièce"><input type="text" class="piece-ref" placeholder="Réf."><button class="btn-remove" onclick="removePiece(this)">✕</button>`;
            c.appendChild(d);
        }

        function removeEch(b) { const e = document.querySelectorAll('#echellesContainer .piece-row'); if (e.length > 1) b.closest('.piece-row').remove(); else alert('Au moins une échelle.'); }

        function addEch() {
            const c = document.getElementById('echellesContainer'), d = document.createElement('div');
            d.className = 'piece-row';
            d.innerHTML = `<input type="text" class="piece-label echelle-label" placeholder="Nom"><input type="text" class="piece-ref echelle-value" placeholder="Échelle"><button class="btn-remove" onclick="removeEch(this)">✕</button>`;
            c.appendChild(d);
        }

        function selectType(btn, val) {
            document.getElementById('titreDossier').value = val;
            document.getElementById('btnPermis').style.background = 'var(--card)';
            document.getElementById('btnPermis').style.color = 'var(--primary)';
            document.getElementById('btnModif').style.background = 'var(--card)';
            document.getElementById('btnModif').style.color = 'var(--primary)';
            btn.style.background = 'var(--primary)';
            btn.style.color = 'white';
        }

        function removeSurf(b) { const s = document.querySelectorAll('#surfacesContainer .surface-row'); if (s.length > 1) b.closest('.surface-row').remove(); else alert('Au moins une surface.'); }
        function addSurf() {
            const c = document.getElementById('surfacesContainer'), d = document.createElement('div');
            d.className = 'surface-row';
            d.innerHTML = `<input type="text" class="surface-label" placeholder="Nom"><input type="text" class="surface-value" placeholder="Valeur"><button class="btn-remove" onclick="removeSurf(this)">✕</button>`;
            c.appendChild(d);
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a3' });
            const pw = doc.internal.pageSize.getWidth();
            const ph = doc.internal.pageSize.getHeight();

            const commune = document.getElementById('commune').value;
            const adresse = document.getElementById('adresse').value;
            const maitre = document.getElementById('maitre').value;

            const titrePdf = document.getElementById('titreDossier')?.value || 'DOSSIER DE DEMANDE DE PERMIS DE CONSTRUIRE';

            const pieces = [];
            document.querySelectorAll('#piecesContainer .piece-row').forEach(r => {
                pieces.push([r.querySelector('.piece-label').value, r.querySelector('.piece-ref').value]);
            });
            const surfaces = [];
            document.querySelectorAll('#surfacesContainer .surface-row').forEach(r => {
                const l = r.querySelector('.surface-label').value;
                const v = r.querySelector('.surface-value').value;
                if (l && v) surfaces.push([l, v]);
            });

            const navy = [26, 58, 82], gold = [181, 149, 72], dark = [35, 35, 35], mid = [100, 100, 100];

            // BORDURE
            doc.setDrawColor(...navy); doc.setLineWidth(1.5);
            doc.rect(4, 4, pw - 8, ph - 8);
            doc.setDrawColor(...gold); doc.setLineWidth(0.5);
            doc.rect(6, 6, pw - 12, ph - 12);

            // HEADER
            doc.setFillColor(...navy);
            doc.rect(6, 6, pw - 12, 24, 'F');
            doc.setFillColor(...gold);
            doc.rect(6, 30, pw - 12, 2, 'F');
            doc.setFontSize(22); doc.setFont('times', 'bold'); doc.setTextColor(255, 255, 255);
            doc.text(titrePdf, pw / 2, 22, { align: 'center' });

            // 2 COLONNES (au lieu de 3, pour laisser le centre vide et permettre le pliage)
            const bodyTop = 36;
            const bodyBottom = ph - 8;
            const bodyH = bodyBottom - bodyTop;
            const centerX = pw / 2;
            const gap = 15;
            const leftW = centerX - 8 - gap;
            const rightX = centerX + gap;
            const rightW = pw - 8 - rightX;

            // ═══ COL 1 : PIECES + ECHELLES + SURFACES ═══
            const lx = 16;
            let y = bodyTop + 10;
            const tw = leftW - 24;

            doc.setFontSize(13); doc.setFont('times', 'bold'); doc.setTextColor(...navy);
            doc.text('PIECES CONSTITUANT LE DOSSIER', lx, y);
            y += 5;

            doc.autoTable({
                startY: y,
                head: [['PIECE', 'REF.']],
                body: pieces,
                theme: 'grid',
                headStyles: { fillColor: navy, fontSize: 10, fontStyle: 'bold', halign: 'center', font: 'times', cellPadding: 3 },
                bodyStyles: { fontSize: 9, font: 'times', cellPadding: 3 },
                alternateRowStyles: { fillColor: [248, 246, 241] },
                columnStyles: {
                    0: { cellWidth: tw - 30, fontStyle: 'bold' },
                    1: { cellWidth: 30, halign: 'center' }
                },
                margin: { left: lx },
                tableWidth: tw
            });

            y = doc.lastAutoTable.finalY + 10;

            doc.setFontSize(13); doc.setFont('times', 'bold'); doc.setTextColor(...navy);
            doc.text('ECHELLES', lx, y);
            y += 5;

            const echelles = [];
            document.querySelectorAll('#echellesContainer .piece-row').forEach(r => {
                const l = r.querySelector('.echelle-label').value;
                const v = r.querySelector('.echelle-value').value;
                if (l || v) echelles.push([l, v]);
            });

            doc.autoTable({
                startY: y,
                body: echelles,
                theme: 'grid',
                bodyStyles: { fontSize: 9, font: 'times', cellPadding: 3 },
                alternateRowStyles: { fillColor: [248, 246, 241] },
                columnStyles: {
                    0: { cellWidth: tw - 30, fontStyle: 'bold' },
                    1: { cellWidth: 30, halign: 'center' }
                },
                margin: { left: lx },
                tableWidth: tw
            });

            y = doc.lastAutoTable.finalY + 10;

            doc.setFontSize(13); doc.setFont('times', 'bold'); doc.setTextColor(...navy);
            doc.text('SURFACES', lx, y);
            y += 5;

            doc.autoTable({
                startY: y,
                body: surfaces,
                theme: 'grid',
                bodyStyles: { fontSize: 9, font: 'times', cellPadding: 3 },
                alternateRowStyles: { fillColor: [248, 246, 241] },
                columnStyles: {
                    0: { cellWidth: tw - 35, fontStyle: 'bold' },
                    1: { cellWidth: 35, halign: 'center' }
                },
                margin: { left: lx },
                tableWidth: tw
            });

            // ═══ COL 2 : INFOS PROJET ═══
            const rx = rightX + 15;
            const rw = rightW - 30;
            let ry = bodyTop + 12;

            // Commune
            doc.setFillColor(...navy);
            doc.roundedRect(rx - 5, ry - 5, rw + 10, bodyH * 0.22, 3, 3, 'F');
            doc.setFontSize(9); doc.setFont('times', 'normal'); doc.setTextColor(...gold);
            doc.text('COMMUNE', rx + 2, ry + 3);
            doc.setFontSize(24); doc.setFont('times', 'bold'); doc.setTextColor(255, 255, 255);
            const cLines = doc.splitTextToSize(commune, rw);
            doc.text(cLines, rx + 2, ry + 16);

            // Adresse
            ry = bodyTop + bodyH * 0.28 + 10;
            doc.setFontSize(9); doc.setFont('times', 'bold'); doc.setTextColor(...gold);
            doc.text('ADRESSE DU PROJET', rx, ry);
            ry += 8;
            doc.setFontSize(16); doc.setFont('times', 'normal'); doc.setTextColor(...dark);
            const aLines = doc.splitTextToSize(adresse, rw);
            doc.text(aLines, rx, ry);

            ry += aLines.length * 8 + 12;
            doc.setDrawColor(...gold); doc.setLineWidth(0.5);
            doc.line(rx, ry, rx + rw, ry);
            ry += 10;

            // Maitre d'ouvrage
            doc.setFontSize(9); doc.setFont('times', 'bold'); doc.setTextColor(...gold);
            doc.text("MAITRE D'OUVRAGE", rx, ry);
            ry += 8;
            doc.setFontSize(16); doc.setFont('times', 'normal'); doc.setTextColor(...dark);
            const mLines = doc.splitTextToSize(maitre, rw);
            doc.text(mLines, rx, ry);

            // Type en bas
            doc.setFontSize(8); doc.setFont('times', 'italic'); doc.setTextColor(...mid);
            doc.text('PERMIS DE CONSTRUIRE', rx, bodyBottom - 10);

            const customNameStr = document.getElementById('documentName')?.value?.trim();
            const nomFichier = customNameStr ? customNameStr + '.pdf' : 'Cartouche_2_PC.pdf';
            doc.save(nomFichier);
        }
    </script>
</body>

</html>
